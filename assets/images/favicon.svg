<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for Gradients -->
  <defs>
    <radialGradient id="fav-bg" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#389a91" />
      <stop offset="100%" stop-color="#0f766e" />
    </radialGradient>
  </defs>

  <!-- Circular Badge Background -->
  <circle cx="50" cy="50" r="48" fill="url(#fav-bg)" />

  <!-- Sprinkler Logo centered and scaled inside -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Soil Mounds -->
    <path d="M5 88c5-6 12-6 17 0" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M22 88c5-6 12-6 17 0" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M60 88c5-6 12-6 17 0" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />

    <!-- Ground lines -->
    <path d="M10 88h8" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M42 88h12" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M80 88h10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />

    <!-- Riser -->
    <path d="M58 30v58" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    
    <!-- Head -->
    <rect x="53" y="22" width="10" height="8" rx="1" fill="#cbd5e1" stroke="#ffffff" stroke-width="2.5" />
    <path d="M54.5 16h7v6h-7z" fill="#94a3b8" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" />
    <rect x="50" y="11" width="16" height="5" rx="1.5" fill="#64748b" stroke="#ffffff" stroke-width="2.5" />

    <!-- Spray -->
    <path d="M43 14L10 9" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M41 17H8" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M42 20L11 26" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M44 23L16 33" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />

    <path d="M73 14l33-5" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M75 17h33" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M74 20l31 6" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />
    <path d="M72 23l28 10" fill="none" stroke="#60a5fa" stroke-dasharray="4 4" stroke-width="3" stroke-linecap="round" />

    <!-- Droplets -->
    <path d="M15 44c-1.5 2-2.5 3.5-2.5 5a2.5 2.5 0 0 0 5 0c0-1.5-1-3-2.5-5z" fill="#60a5fa" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M72 45c-1.5 2-2.5 3.5-2.5 5a2.5 2.5 0 0 0 5 0c0-1.5-1-3-2.5-5z" fill="#60a5fa" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M33 53c-1.5 2-2.5 3.5-2.5 5a2.5 2.5 0 0 0 5 0c0-1.5-1-3-2.5-5z" fill="#60a5fa" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Left Sprout -->
    <path d="M15 54v34" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M15 75c-6-3-9 2-9 6s6 5 9 1z" fill="#22c55e" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
    <path d="M15 67c6-3 9 2 9 6s-6 5-9 1z" fill="#4ade80" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
    <path d="M15 57c-5-3-7.5 1.5-7.5 5s5 4 7.5 1z" fill="#22c55e" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />

    <!-- Middle Sprout -->
    <path d="M33 65v23" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M33 78c-6-3-9 2-9 6s6 5 9 1z" fill="#22c55e" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
    <path d="M33 70c6-3 9 2 9 6s-6 5-9 1z" fill="#4ade80" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />

    <!-- Right Sprout -->
    <path d="M72 56v32" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M72 76c-6-3-9 2-9 6s6 5 9 1z" fill="#22c55e" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
    <path d="M72 68c6-3 9 2 9 6s-6 5-9 1z" fill="#4ade80" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
    <path d="M72 58c-5-3-7.5 1.5-7.5 5s5 4 7.5 1z" fill="#22c55e" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" />
  </g>
</svg>
