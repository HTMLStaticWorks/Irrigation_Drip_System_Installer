<html lang="en">

    <title>Account Login | Irrigation Installer Portal</title>
    <meta name="description" content="Access your client profile to manage scheduled site visits, track custom design layouts, view pricing estimates, and message our drip irrigation experts." />

      rel="stylesheet"

    />

    <link rel="stylesheet" href="./assets/css/style.css" />

  <body>
    <a class="skip-link btn btn-sm btn-primary" href="#main">Skip to content</a>

    <div class="position-absolute top-0 end-0 p-3 d-flex gap-2" style="z-index: 1100">
      <button
        type="button"
        class="btn btn-sm btn-outline-secondary btn-icon"
        data-action="toggle-theme"
        aria-pressed="false"
        aria-label="Toggle theme"
      >
        <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <button
        type="button"
        class="btn btn-sm btn-outline-secondary btn-icon"
        data-action="toggle-rtl"
        aria-pressed="false"
      >
        RTL
      </button>
    </div>

    <main id="main" class="min-vh-100 d-flex align-items-center pt-5 pt-md-0">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5">
            <div class="surface p-4 p-md-5">
              <div class="d-flex justify-content-center mb-4">
                <a class="navbar-brand text-decoration-none" href="./index.html">
                  <span class="brand-mark" aria-hidden="true"></span>
                  <span>Irrigo</span>
                </a>
              </div>

              <h1 class="h4 text-center mb-1">Welcome back</h1>
              <p class="text-center small mb-4" style="color: var(--text-2);">Sign in to manage your irrigation projects and quotes.</p>

              <form class="row g-3" data-validate novalidate>
                <div class="col-12">
                  <label class="form-label" for="loginEmail">Email</label>
                  <input id="loginEmail" class="form-control" type="email" required autocomplete="email" />
                </div>

                <div class="col-12">
                  <label class="form-label" for="loginPassword">Password</label>
                  <div class="input-group">
                    <input
                      id="loginPassword"
                      class="form-control"
                      type="password"
                      required
                      autocomplete="current-password"
                    />
                    <button
                      class="btn btn-outline-secondary btn-icon"
                      type="button"
                      data-action="toggle-password"
                      data-target="loginPassword"
                      aria-pressed="false"
                      aria-label="Show password"
                    >
                      <svg class="password-icon-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                      <svg class="password-icon-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                    </button>
                  </div>
                </div>

                <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="rememberMe" />
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                  <a href="./coming-soon.html" class="text-decoration-none">Forgot password?</a>
                </div>

                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">Login</button>
                </div>

                <div class="col-12">
                  <div class="d-flex align-items-center gap-2 my-2">
                    <div class="flex-grow-1" style="height: 1px; background: var(--border-1)"></div>
                    <small>or continue with</small>
                    <div class="flex-grow-1" style="height: 1px; background: var(--border-1)"></div>
                  </div>
                   <div class="row g-2">
                    <div class="col-12 col-sm-6 d-grid">
                      <button type="button" class="btn btn-outline-secondary d-inline-flex align-items-center justify-content-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                        </svg>
                        <span>Google</span>
                      </button>
                    </div>
                    <div class="col-12 col-sm-6 d-grid">
                      <button type="button" class="btn btn-outline-secondary d-inline-flex align-items-center justify-content-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.51 12.067 1.007 1.45 2.187 3.078 3.766 3.02 1.524-.057 2.098-.98 3.938-.98 1.829 0 2.365.98 3.96.948 1.623-.027 2.668-1.474 3.664-2.924 1.153-1.687 1.623-3.324 1.655-3.411-.037-.015-3.178-1.222-3.21-4.819-.028-3.003 2.455-4.437 2.57-4.505-1.41-2.066-3.576-2.296-4.341-2.351-1.92-.158-3.28 1.025-3.836 1.025zm1.905-4.595c.823-1.002 1.375-2.388 1.222-3.774-1.19.048-2.628.788-3.483 1.787-.753.864-1.41 2.274-1.233 3.639 1.325.103 2.671-.65 3.494-1.652z"/>
                        </svg>
                        <span>Apple</span>
                      </button>
                    </div>
                  </div>
                </div>

                <div class="col-12 text-center">
                  <small>
                    Don’t have an account?
                    <a href="./register.html" class="text-decoration-none">Create one</a>
                  </small>
                </div>
              </form>
            </div>


          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.min.js"></script>
  </body>
</html>
