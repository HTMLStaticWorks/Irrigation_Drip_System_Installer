<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />

    <title>Account Login | Irrigation Installer Portal</title>
    <meta name="description" content="Access your client profile to manage scheduled site visits, track custom design layouts, view pricing estimates, and message our drip irrigation experts." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;520;540;580&display=swap" rel="stylesheet" />

    <link
      id="bootstrap-css-ltr"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      id="bootstrap-css-rtl"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
      disabled
    />

    <link rel="stylesheet" href="./assets/css/style.min.css" />
    <link rel="stylesheet" href="./assets/css/dark-mode.min.css" />
    <link rel="stylesheet" href="./assets/css/rtl.min.css" />
      <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Client Portal Login",
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://www.irrigationdripinstaller.com/index.html"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Login",
        "item": "https://www.irrigationdripinstaller.com/login.html"
      }
    ]
  }
}
    </script>
      <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Client Portal Login",
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://www.irrigationdripinstaller.com/index.html"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Login",
        "item": "https://www.irrigationdripinstaller.com/login.html"
      }
    ]
  }
}
    </script>
  </head>
  <body>
    <a class="skip-link btn btn-sm btn-primary" href="#main">Skip to content</a>

    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2" style="z-index: 1100">
      <button
        type="button"
        class="btn btn-sm btn-outline-secondary btn-icon"
        data-action="toggle-theme"
        aria-pressed="false"
        aria-label="Toggle theme"
      >
        <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <button
        type="button"
        class="btn btn-sm btn-outline-secondary btn-icon"
        data-action="toggle-rtl"
        aria-pressed="false"
      >
        RTL
      </button>
    </div>

    <main id="main" class="min-vh-100 d-flex align-items-center">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-sm-10 col-md-8 col-lg-5">
            <div class="surface p-4 p-md-5">
              <div class="d-flex justify-content-center mb-4">
                <a class="navbar-brand text-decoration-none" href="./index.html">
                  <span class="brand-mark" aria-hidden="true"></span>
                  <span>Irrigo</span>
                </a>
              </div>

              <h1 class="h4 text-center mb-4">Welcome back</h1>

              <form class="row g-3" data-validate novalidate>
                <div class="col-12">
                  <label class="form-label" for="loginEmail">Email</label>
                  <input id="loginEmail" class="form-control" type="email" required autocomplete="email" />
                </div>

                <div class="col-12">
                  <label class="form-label" for="loginPassword">Password</label>
                  <div class="input-group">
                    <input
                      id="loginPassword"
                      class="form-control"
                      type="password"
                      required
                      autocomplete="current-password"
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      data-action="toggle-password"
                      data-target="loginPassword"
                      aria-pressed="false"
                      aria-label="Show password"
                    >
                      Show
                    </button>
                  </div>
                </div>

                <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="rememberMe" />
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                  <a href="./coming-soon.html" class="text-decoration-none">Forgot password?</a>
                </div>

                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">Login</button>
                </div>

                <div class="col-12">
                  <div class="d-flex align-items-center gap-2 my-2">
                    <div class="flex-grow-1" style="height: 1px; background: var(--border-1)"></div>
                    <small>or continue with</small>
                    <div class="flex-grow-1" style="height: 1px; background: var(--border-1)"></div>
                  </div>
                  <div class="row g-2">
                    <div class="col-12 col-sm-6 d-grid">
                      <button type="button" class="btn btn-outline-secondary">Google</button>
                    </div>
                    <div class="col-12 col-sm-6 d-grid">
                      <button type="button" class="btn btn-outline-secondary">Apple</button>
                    </div>
                  </div>
                </div>

                <div class="col-12 text-center">
                  <small>
                    Don’t have an account?
                    <a href="./register.html" class="text-decoration-none">Create one</a>
                  </small>
                </div>
              </form>
            </div>


          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.min.js"></script>
  </body>
</html>
